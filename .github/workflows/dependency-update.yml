name: Dependency Updates

on:
  schedule:
    # 每周一上午 9 点运行
    - cron: '0 1 * * 1'  # UTC 1:00 AM = Beijing 9:00 AM
  workflow_dispatch:

jobs:
  # ============================================================================
  # 依赖安全扫描
  # ============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audit tools
        run: |
          pip install safety pip-audit

      - name: Run safety check
        continue-on-error: true
        run: |
          echo "### 🔒 Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for dir in 01_create_support_knowledegbase_rag 02_AWS_Support_Case_Lambda 04_create_knowledge_mcp_gateway_Agent; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "**Module: $dir**" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              safety check -r "$dir/requirements.txt" --output text >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Run pip-audit
        continue-on-error: true
        run: |
          for dir in 01_create_support_knowledegbase_rag 04_create_knowledge_mcp_gateway_Agent; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "Auditing $dir..."
              pip-audit -r "$dir/requirements.txt" || true
            fi
          done

  # ============================================================================
  # 创建依赖更新 Issue（如果发现漏洞）
  # ============================================================================
  create-issue:
    name: Create Security Issue
    runs-on: ubuntu-latest
    needs: security-audit
    if: failure()

    steps:
      - name: Create issue for vulnerabilities
        uses: actions/github-script@v8
        with:
          script: |
            const title = '🔒 Security vulnerabilities detected in dependencies';
            const body = `
            ## Security Audit Alert

            The weekly dependency security scan has detected potential vulnerabilities.

            **Action Required:**
            1. Review the [workflow run logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            2. Update affected dependencies
            3. Test the changes
            4. Create a PR with the fixes

            **Next Steps:**
            - Check \`safety\` and \`pip-audit\` outputs
            - Update \`requirements.txt\` files
            - Regenerate \`requirements-lock.txt\` if needed

            ---
            🤖 This issue was automatically created by the dependency update workflow.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'dependencies', 'automated'],
            });

  # ============================================================================
  # 检查过时的依赖
  # ============================================================================
  check-outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Check outdated packages
        run: |
          echo "### 📦 Outdated Dependencies Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for dir in 01_create_support_knowledegbase_rag 04_create_knowledge_mcp_gateway_Agent; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "**Module: $dir**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              cd "$dir"
              python -m venv .venv
              source .venv/bin/activate

              uv pip install -r requirements.txt > /dev/null 2>&1
              pip list --outdated --format=columns >> $GITHUB_STEP_SUMMARY || true

              deactivate
              rm -rf .venv
              cd ..
            fi
          done

  # ============================================================================
  # Dependabot 配置提醒
  # ============================================================================
  dependabot-status:
    name: Check Dependabot Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Dependabot config
        run: |
          if [ ! -f ".github/dependabot.yml" ]; then
            echo "::warning::Dependabot not configured. Consider enabling it for automated dependency PRs."
            echo "### ⚠️ Dependabot Not Configured" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Enable Dependabot by creating \`.github/dependabot.yml\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Dependabot is configured" >> $GITHUB_STEP_SUMMARY
          fi
